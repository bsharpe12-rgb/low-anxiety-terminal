name: Daily Market Data Sync

on:
  schedule:
    # Runs automatically every day at 8:00 AM EST (13:00 UTC)
    - cron: '20 20 * * *'
  workflow_dispatch: # Allows you to also trigger it manually from GitHub

jobs:
  update-market-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Add any other packages your engine.py needs to run here

      - name: Run Market Data Engine
        env:
          # If your code uses any API keys (like Gemini), they stay safe here
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python engine.py

      - name: Commit and Push fresh JSON data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add business_bundle.json
          git diff-index --quiet HEAD || git commit -m "Auto-update market data"
          git push
